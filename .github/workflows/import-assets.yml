name: Importar arquivos institucionais

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/import-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copiar fotos e logotipo do projeto legado
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://raw.githubusercontent.com/anthonytribeiro587/sistema-agendamento/main/public"
          mkdir -p public/fotos

          for photo in 1.jpeg 2.jpeg 3.jpeg 4.jpeg 5.jpeg 6.jpeg; do
            curl --fail --location --retry 3 --retry-delay 2 \
              "$BASE_URL/fotos/$photo" \
              --output "public/fotos/$photo"
          done

          curl --fail --location --retry 3 --retry-delay 2 \
            "$BASE_URL/logo-sitio-emanuel.png" \
            --output "public/logo-sitio-emanuel.png"

          test -s public/fotos/1.jpeg
          test -s public/fotos/2.jpeg
          test -s public/fotos/3.jpeg
          test -s public/fotos/4.jpeg
          test -s public/fotos/5.jpeg
          test -s public/fotos/6.jpeg
          test -s public/logo-sitio-emanuel.png

      - name: Salvar os arquivos no novo repositório
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/fotos public/logo-sitio-emanuel.png

          if git diff --cached --quiet; then
            echo "Os arquivos já estão atualizados."
            exit 0
          fi

          git commit -m "Adicionar fotos e logotipo locais"
          git push
