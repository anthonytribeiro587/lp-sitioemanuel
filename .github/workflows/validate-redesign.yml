name: Validar redesign

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar dependências
        run: npm install --no-audit --no-fund
      - name: Verificar lint
        run: npm run lint
      - name: Gerar build
        run: npm run build
